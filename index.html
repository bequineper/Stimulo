<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stimulo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="medias/favicon-rounded-stimulo.ico" type="image/x-icon" class="favicon">

</head>
<body>
    <header>
            <div class="logo">
                <img src="medias/stimulo-logo.png" href="" alt="">
            </div>
            <nav>
                <ul>
                    <li class="dashboards"><a href="">Dashboards</a></li>
                    <li><a href="">Documents..</a></li>
                    <li><a href="">Community</a></li>
                    <li><a href="">Personalize</a></li>
                    <li><a href="">Pricing</a></li>
                    <li><a href="">Contact</a></li> 
                </ul>
            </nav>    
            <div class="user">
                <button class="loginButton">
                    <a href="">Sign In</a>
                </button>
                <button class="registerButton">
                    <a href="">Register</a>
                </button>
            </div>
    </header>
    <div class="mySpace">
        <div class="searchBar">
            <input name="q" type="text" 
            class="input_searchbar" 
            placeholder="Search documents">
            
            <i class="bi bi-search"></i>
        </div>
    </div>
    <main>
        <section id="shopItens">
            <ul class ="shopList">
                <li>
                    <div class="item">
                        <div class="itemCard">
                            <div class="itemImg"> 
                                <img src="medias/t-shirt.png" alt="white t-shirt image">
                            </div>
                            <span class="itemName">Tech T- <br> Shirt</span>
                            <span class="itemPrice">$25</span>
                        </div>
                        <div class="buyButton">
                            <button class="buy"><a href="">Buy</a></button>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="item">
                        <div class="itemCard">
                            <div class="itemImg"> 
                                <img src="medias/Sem nome (400 x 700 px)/t-shirt-basic-white.png" alt="white t-shirt image">
                            </div>
                            <span class="itemName">Basic T- <br> Shirt</span>
                            <span class="itemPrice">$20</span>
                        </div>
                        <div class="buyButton">
                            <button class="buy"><a href="">Buy</a></button>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="item">
                        <div class="itemCard">
                            <div class="itemImg"> 
                                <img src="medias/t-shirt-black.png" alt="white t-shirt image">
                            </div>
                            <span class="itemName">Tech T- <br> Shirt</span>
                            <span class="itemPrice">$25</span>
                        </div>
                        <div class="buyButton">
                            <button class="buy"><a href="">Buy</a></button>
                        </div>
                    </div>
                </li>
                <li>
                    <div class="item">
                        <div class="itemCard">
                            <div class="itemImg"> 
                                <img src="medias/Sem nome (400 x 700 px)/t-shirt-basic-black.png" alt="white t-shirt image">
                            </div>
                            <span class="itemName">Tech T- <br> Shirt</span>
                            <span class="itemPrice">$20</span>
                        </div>
                        <div class="buyButton">
                            <button class="buy"><a href="">Buy</a></button>
                        </div>
                    </div>
                </li>
               
            </ul>
        </section>
    </main>

    
</body>
</html>
